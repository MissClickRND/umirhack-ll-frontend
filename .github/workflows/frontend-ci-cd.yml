name: Frontend CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build and typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy to VPS
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Upload artifact to VPS temp directory
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          source: frontend-dist
          target: /tmp/umirhack-frontend-dist
          rm: true

      - name: Publish static files and reload nginx
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_DEPLOY_PATH: ${{ secrets.FRONTEND_DEPLOY_PATH }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || 22 }}
          script_stop: true
          envs: FRONTEND_DEPLOY_PATH
          script: |
            set -euo pipefail
            TMP_ROOT="/tmp/umirhack-frontend-dist"
            DEPLOY_PATH="${FRONTEND_DEPLOY_PATH:-/var/www/umirhack-frontend}"

            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            if [ -f "$TMP_ROOT/index.html" ]; then
              SRC_PATH="$TMP_ROOT"
            elif [ -f "$TMP_ROOT/frontend-dist/index.html" ]; then
              SRC_PATH="$TMP_ROOT/frontend-dist"
            else
              SRC_PATH="$(find "$TMP_ROOT" -maxdepth 4 -type f -name index.html -printf '%h\n' | head -n 1)"
            fi

            if [ -z "${SRC_PATH:-}" ] || [ ! -f "$SRC_PATH/index.html" ]; then
              echo "Build artifact does not contain index.html"
              exit 1
            fi

            $SUDO mkdir -p "$DEPLOY_PATH"
            $SUDO find "$DEPLOY_PATH" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            $SUDO cp -r "$SRC_PATH"/. "$DEPLOY_PATH"/
            rm -rf "$TMP_ROOT"

            if command -v systemctl >/dev/null 2>&1; then
              $SUDO systemctl reload nginx || true
            fi
